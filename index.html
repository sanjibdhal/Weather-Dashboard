<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🌤 Weather Dashboard</h1>

<p class="subtitle">
Get real-time weather updates for any city.
</p>

<div class="search-box">

<input
type="text"
id="cityInput"
placeholder="Enter city name"
>

<button id="searchBtn">
Search
</button>

</div>

<div id="loading">

</div>

<div id="error">

</div>

<div id="weatherCard">

<h2 id="cityName">
City
</h2>

<div id="weatherIcon">
🌤
</div>

<p>
🌡 Temperature:
<span id="temperature">
--
</span>
°C
</p>

<p>
☁ Condition:
<span id="condition">
--
</span>
</p>

<p>
💧 Humidity:
<span id="humidity">
--
</span>
%
</p>

<p>
🌬 Wind Speed:
<span id="wind">
--
</span>
km/h
</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
